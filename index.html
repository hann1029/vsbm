<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VSBM Sphere</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let w, h;
        const dots = [];
        const count = 3000; // 降低數量，保證不黑屏

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            for (let i = 0; i < count; i++) {
                const phi = Math.acos(-1 + (2 * i) / count);
                const theta = Math.sqrt(count * Math.PI) * phi;
                dots.push({ phi, theta, color: hsl(${i % 360}, 100%, 70%) });
            }
        }

        let rot = 0;
        function draw() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, w, h);
            rot += 0.01;
            const r = Math.min(w, h) * 0.35;

            for (let i = 0; i < count; i++) {
                const d = dots[i];
                let x = Math.cos(d.theta + rot) * Math.sin(d.phi);
                let y = Math.sin(d.theta + rot) * Math.sin(d.phi);
                let z = Math.cos(d.phi);

                // 簡單 3D 投影
                const sc = 400 / (400 + z * r);
                const sx = w / 2 + x * r * sc;
                const sy = h / 2 + y * r * sc;

                ctx.fillStyle = d.color;
                ctx.fillRect(sx, sy, 2, 2);
            }
            requestAnimationFrame(draw);
        }

        window.onload = () => { init(); draw(); };
    </script>
</body>
</html>
