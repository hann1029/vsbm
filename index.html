<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSBM Sphere</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="sphereCanvas"></canvas>

    <script>
        const canvas = document.getElementById('sphereCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        const particles = [];
        const particleCount = 20000; // 兩萬個粒子（2D 下這數量非常吃資源）

        // 參數偵測
        window.onload = () => {
            resize();
            initParticles();
            animate();

            const params = new URLSearchParams(window.location.search);
            const data = params.get('data');
            if (data) {
                try {
                    const decoded = decodeURIComponent(escape(atob(data)));
                    setTimeout(() => { alert(decoded); }, 1000);
                } catch (e) {}
            }
        };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);

        function initParticles() {
            for (let i = 0; i < particleCount; i++) {
                // 使用球極座標分布
                const phi = Math.acos(-1 + (2 * i) / particleCount);
                const theta = Math.sqrt(particleCount * Math.PI) * phi;
                particles.push({
                    phi: phi,
                    theta: theta,
                    color: hsl(${Math.random() * 360}, 100%, 70%)
                });
            }
        }

        let rotation = 0;
        function animate() {
            // 每一幀都填滿黑色背景
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, width, height);

            rotation += 0.01;
            const radius = Math.min(width, height) * 0.4;

            // 核心：手寫 3D 投影到 2D（非常吃 CPU 運算）
            for (let i = 0; i < particleCount; i++) {
                const p = particles[i];
                
                // 3D 座標計算
                let x = Math.cos(p.theta + rotation) * Math.sin(p.phi);
                let y = Math.sin(p.theta + rotation) * Math.sin(p.phi);
                let z = Math.cos(p.phi);

                // 繞 X 軸旋轉增加動感
                const tempY = y * Math.cos(rotation * 0.5) - z * Math.sin(rotation * 0.5);
                const tempZ = y * Math.sin(rotation * 0.5) + z * Math.cos(rotation * 0.5);
                
                // 投影到螢幕座標
                const perspective = 600 / (600 + tempZ * radius);
                const screenX = width / 2 + x * radius * perspective;
                const screenY = height / 2 + tempY * radius * perspective;

                // 繪製粒子
                ctx.fillStyle = p.color;
                // 加入隨機震動（增加負載）
                const shake = (Math.random() - 0.5) * 2;
                ctx.fillRect(screenX + shake, screenY + shake, 2 * perspective, 2 * perspective);
            }

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
