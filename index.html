<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSBM</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; color: #333; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 500px; text-align: center; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 30px; letter-spacing: 1px; }
        input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 16px; margin-bottom: 20px; outline: none; }
        input:focus { border-color: #000; }
        button { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; transition: 0.2s; }
        button:hover { background: #333; }
        #result { margin-top: 30px; padding: 15px; background: #f9f9f9; border: 1px solid #eee; word-break: break-all; display: none; cursor: pointer; font-size: 14px; color: #666; }
        .footer { margin-top: 40px; font-size: 12px; color: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>VSBM</h1>
        <input type="text" id="input" placeholder="输入內容或網址">
        <button onclick="generate()">生成連結</button>
        <div id="result" onclick="copy()"></div>
        <div class="footer">點擊生成的連結即可複製</div>
    </div>

    <script>
        // 核心邏輯：進入網頁時自動處理
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const data = params.get('data');
            if (data) {
                try {
                    const decoded = decodeURIComponent(escape(atob(data)));
                    // 如果是網址，直接跳轉 (cznull 的核心功能)
                    if (decoded.startsWith('http://') || decoded.startsWith('https://')) {
                        window.location.href = decoded;
                    } else {
                        // 如果不是網址，顯示在輸入框並提示
                        document.getElementById('input').value = decoded;
                        alert("收到悄悄話：" + decoded);
                    }
                } catch (e) {
                    console.error("解碼失敗");
                }
            }
        };

        function generate() {
            const val = document.getElementById('input').value;
            if (!val) return;
            const encoded = btoa(unescape(encodeURIComponent(val)));
            const url = window.location.origin + window.location.pathname + "?data=" + encoded;
            const resDiv = document.getElementById('result');
            resDiv.innerText = url;
            resDiv.style.display = "block";
        }

        function copy() {
            const text = document.getElementById('result').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("已複製到剪貼簿");
            });
        }
    </script>
</body>
</html>
